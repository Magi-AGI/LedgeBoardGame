    version: 12.0.2
    source: registry

  - name: com.unity.2d.sprite
    version: 1.0.0
    source: registry

  - name: com.unity.2d.tilemap
    version: 1.0.0
    source: registry

  - name: com.unity.2d.spriteshape
    version: 12.0.1
    source: registry

  - name: com.unity.2d.aseprite
    version: 2.0.2
    source: registry

  - name: com.unity.2d.psdimporter
    version: 11.0.1
    source: registry

  - name: com.unity.2d.common
    version: 11.0.1
    source: registry

  - name: com.unity.2d.enhancers
    version: 1.0.0
    source: registry

  - name: com.unity.2d.tilemap.extras
    version: 5.0.1
    source: registry

  # Testing
