registries:
  magi: https://registry.magi.dev
scopes:
  - com.magi
  - com.inktools
unity:
  editor: 6000.2.5f1
  rp: urp
  rp_version: 17.2.0
packages:
  # Core Unity packages
  com.unity.inputsystem: 1.14.2
  com.unity.burst: 1.8.25
  com.unity.mathematics: 1.3.1

  # 2D packages for board game
  com.unity.2d.animation: 12.0.2
  com.unity.2d.aseprite: 2.0.2
  com.unity.2d.enhancers: 1.0.0
  com.unity.2d.psdimporter: 11.0.1
  com.unity.2d.sprite: 1.0.0
  com.unity.2d.spriteshape: 12.0.1
  com.unity.2d.tilemap: 1.0.0
  com.unity.2d.tilemap.extras: 5.0.1

  # AI packages (for Unity AI Assistant)
  com.unity.ai.assistant: 1.0.0-pre.12
  com.unity.ai.generators: 1.0.0-pre.20
  com.unity.ai.inference: 2.3.0

  # IDE support
  com.unity.collab-proxy: 2.9.3
  com.unity.ide.rider: 3.0.38
  com.unity.ide.visualstudio: 2.0.23

  # Other Unity packages
  com.unity.multiplayer.center: 1.0.0
  com.unity.test-framework: 1.5.1
  com.unity.textmeshpro: 3.0.9
  com.unity.timeline: 1.8.9
  com.unity.ugui: 2.0.0
  com.unity.visualscripting: 1.9.8

  # Magi packages
  com.magi.unitytools: file:../../MagiUnityTools/MagiUnityTools/Assets/_Project/Scripts/UnityTools

policy:
  allowGitDependencies: false
  bannedApis:
    - Resources.Load
    - FindObjectOfType
    - GameObject.Find
    - SendMessage
    - Object.FindObjectsOfType



