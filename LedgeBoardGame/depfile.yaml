  # Unity config package
  - name: com.unity.render-pipelines.universal-config
    version: 17.0.3
    source: registry

# Policy configuration
policy:
  allowGitDependencies: false
  allowPrerelease: true  # Allow for AI packages (pre.X versions)
  requireLockFile: true
  bannedAPIs:
    - GameObject.Find
    - SendMessage
    # Note: Resources.Load is allowed for ScriptableObject config loading
  requiredPackages:
    - com.magi.unitytools
    - com.unity.nuget.newtonsoft-json
  maxPackageCount: 60

# Notes:
# - System.Text.Json is NOT directly available in Unity 6
# - Use Newtonsoft.Json (already included) OR Unity's built-in JsonUtility
# - LedgeGameSpecLoader.cs needs to be updated to use Newtonsoft.Json
