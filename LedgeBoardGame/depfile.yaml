# Magi Unity Dependency File
# Generated for LedgeBoardGame
# Managed by MagiUnityDependencyManager

version: 1.0

project:
  name: LedgeBoardGame
  unityVersion: 6000.2.5f1
  targetPlatforms:
    - StandaloneWindows64
    - WebGL

registries:
  - name: Unity
    url: https://packages.unity.com
    scopes:
      - com.unity
  # Optional: enable only if you have access to the private Magi registry.
  # - name: Magi Private
  #   url: https://registry.magi.dev
  #   scopes:
  #     - com.magi
  #     - com.inktools

packages:
  # Local Magi packages
  - name: com.magi.unitytools
    path: ../../MagiUnityTools/MagiUnityTools/Assets/_Project/Scripts
    source: local

  # JSON Serialization - REQUIRED for LedgeGameSpecLoader
  # Note: Unity 6 supports System.Text.Json via Newtonsoft JSON package
  - name: com.unity.nuget.newtonsoft-json
    version: 3.2.1
    source: registry

  # Core Unity packages
  - name: com.unity.inputsystem
    version: 1.14.2
    source: registry

  - name: com.unity.render-pipelines.universal
    version: 17.2.0
    source: registry

  - name: com.unity.render-pipelines.core
    version: 17.2.0
    source: registry

  - name: com.unity.shadergraph
    version: 17.2.0
    source: registry

  # 2D packages (for board rendering)
