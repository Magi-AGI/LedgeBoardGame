    version: 1.6.0
    source: registry

  - name: com.unity.ext.nunit
    version: 2.0.5
    source: registry

  - name: com.unity.test-framework.performance
    version: 3.2.0
    source: registry

  # Performance & utilities
  - name: com.unity.burst
    version: 1.8.25
    source: registry

  - name: com.unity.collections
    version: 2.6.2
    source: registry

  - name: com.unity.mathematics
    version: 1.3.2
    source: registry

  # UI
  - name: com.unity.ugui
    version: 2.0.0
    source: registry

  - name: com.unity.visualscripting
    version: 1.9.8
    source: registry

  # Development tools
  - name: com.unity.ide.rider
    version: 3.0.38
    source: registry

  - name: com.unity.ide.visualstudio
    version: 2.0.25
    source: registry

  - name: com.unity.collab-proxy
    version: 2.10.0
    source: registry

  # AI/ML tools (optional - Unity AI features)
  - name: com.unity.ai.assistant
    version: 1.0.0-pre.12
    source: registry
    policyException: development-tool

  - name: com.unity.ai.generators
    version: 1.0.0-pre.20
    source: registry
    policyException: development-tool

  - name: com.unity.ai.toolkit
    version: 1.0.0-pre.20
    source: registry
    policyException: development-tool

  - name: com.unity.ai.inference
    version: 2.3.0
